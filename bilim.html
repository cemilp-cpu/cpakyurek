function sayaciGuncelle(){
const gecerliKayitlar = veri.filter(item => item.A.trim() !== "" && item.B.trim() !== "");
document.getElementById("sayac").innerText = `TOPLAM SÖZCÜK: ${gecerliKayitlar.length}`;
}

function arama(){
const k = document.getElementById('kelime').value.toLowerCase().trim();
const sonucDiv = document.getElementById('sonuc');
if(k=="") return;

let bulunanlar = [];
veri.filter(item => item.A.toLowerCase() === k)
.forEach(item => bulunanlar.push(`YABANCI: <b>${item.A}</b> → YALIN: <b>${item.B}</b>`));
veri.filter(item => item.B.toLowerCase() === k)
.forEach(item => bulunanlar.push(`YALIN: <b>${item.B}</b> → YABANCI: <b>${item.A}</b>`));

let sayacHTML = `<div id="sayac">TOPLAM SÖZCÜK: ${veri.filter(item => item.A.trim() !== "" && item.B.trim() !== "").length}</div>`;

if(bulunanlar.length>0){
let html = `<h3>✅ ${bulunanlar.length} Sonuç</h3>`;
bulunanlar.forEach((s,i)=> html += `<div class="numarali">${i+1}. ${s}</div>`);
html += sayacHTML;
sonucDiv.innerHTML = html;
}else{
sonucDiv.innerHTML = `<h3>❓ "${k}" bulunamadı</h3>` + sayacHTML;
}
}

function baska(){
document.getElementById("kelime").value="";
document.getElementById("sonuc").innerHTML=`Yeni kelime yazıp Ara tuşuna basın.<div id="sayac">TOPLAM SÖZCÜK: ${veri.filter(item => item.A.trim() !== "" && item.B.trim() !== "").length}</div>`;
