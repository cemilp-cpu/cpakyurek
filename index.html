.container { width: 100%; max-width: 430px; background: #FFD700; padding: 15px; border-radius: 0px; text-align: center; box-sizing: border-box; }

.search-box { margin-bottom: 10px; }
input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; text-transform: uppercase; box-sizing: border-box; font-weight: bold; }
.islem-satiri { display: flex; gap: 10px; margin-bottom: 15px; }
.action-btn { flex: 1; padding: 12px; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
.btn-bul { background-color: #444444; }
.btn-sor { background-color: #B30000; }
.category-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
.btn-cat { background-color: #006600; color: white; padding: 8px 2px; border: 1px solid #fff; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; }
.btn-active { background-color: #0000CC !important; border: 2px solid #FFF !important; }
.result-area { background: white; padding: 12px; border: 1px solid #ccc; border-radius: 4px; min-height: 45px; font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #000; text-transform: uppercase; }
.admin-panel { background: white; border: 2px solid #000099; padding: 10px; border-radius: 4px; text-align: left; }
.admin-panel h3 { margin: 0 0 8px 0; font-size: 12px; color: #B30000; text-align: center; font-weight: bold; }
.oneri-box { display: flex; gap: 5px; margin-bottom: 8px; }
.oneri-box input { flex: 1; padding: 6px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; text-transform: uppercase; }
.oneri-box button { background: #444444; color: white; border: none; padding: 0 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; }

let toplamAramaSayisi = 0;
let animsaticiEndeks = 0;
let bulunamayanlarSet = new Set();
let genelTekilHavuz = [];
let sonBulunamayanKelime = "";

window.onload = function() {
if(!localStorage.getItem('sozcukluk_geziyor')) localStorage.setItem('sozcukluk_geziyor', '0');
if(!localStorage.getItem('sozcukluk_gezi')) localStorage.setItem('sozcukluk_gezi', '0');

sistemiKokenTemizleVeSirala();
sayaclariYukle();
document.getElementById("txtAra").focus();
};

function sayaclariYukle() {
document.getElementById("lblGeziyor").innerText = localStorage.getItem('sozcukluk_geziyor');
document.getElementById("lblGezi").innerText = localStorage.getItem('sozcukluk_gezi');
}

// HALEN VAR OLANLARI DA KAPSAYAN GÜVENLİ TEKİLLEŞTİRME VE SIRALAMA MOTORU
function sistemiKokenTemizleVeSirala() {
let birlesikListe = [...sozluk, ...sozlukSaglik, ...sozlukBilim, ...sozlukHaklilik, ...sozlukTgid, ...sozlukCokluk];
let gorulenler = new Set();
genelTekilHavuz = [];

birlesikListe.forEach(öge => {
if (öge && öge.A && öge.B) {
let temizA = öge.A.trim().toUpperCase().replace(/i/g, "İ").replace(/ı/g, "I");
let temizB = öge.B.trim().toUpperCase().replace(/i/g, "İ").replace(/ı/g, "I");

// Hem A kümesi hem B kümesi aynı olan birebir mükerrerleri eler, nüansları korur
let benzersizAnahtar = temizA + "|||" + temizB;

if (!gorulenler.has(benzersizAnahtar)) {
gorulenler.add(benzersizAnahtar);
öge.A = temizA;
öge.B = temizB;
genelTekilHavuz.push(öge);
}
}
});

// Genel havuzu Türkçe abece sırasına dizer
genelTekilHavuz.sort((x, y) => x.A.localeCompare(y.A, 'tr'));

// Toplam sözcük sayısını genel havuzun gerçek tekil miktarına eşitleyip basar
document.getElementById("lblTotalSözcuk").innerText = genelTekilHavuz.length;
}

function havuzSec(havuzAdi, element) {
aktifHavuz = havuzAdi;
let buttons = document.getElementsByClassName('btn-cat');
for(let btn of buttons) { btn.classList.remove('btn-active'); }
element.classList.add('btn-active');
document.getElementById("txtAra").focus();
}

function buYukHarfYap(element) {
element.value = element.value.toUpperCase().replace(/i/g, "İ").replace(/ı/g, "I");
}

function handleSearchKeyPress(e) {
if (e.key === 'Enter') { sozcukAra(); }
}

// ÇİFT YÖNLÜ ARAMA, ANIMSATICI VE ÖNERİ KONTROLÜ
function sozcukAra() {
let aranan = document.getElementById("txtAra").value.trim().toUpperCase().replace(/i/g, "İ").replace(/ı/g, "I");
if(!aranan) return;

toplamAramaSayisi++;
let geziyor = parseInt(localStorage.getItem('sozcukluk_geziyor')) + 1;
let gezi = parseInt(localStorage.getItem('sozcukluk_gezi')) + 1;
localStorage.setItem('sozcukluk_geziyor', geziyor.toString());
localStorage.setItem('sozcukluk_gezi', gezi.toString());
sayaclariYukle();

// ANIMSATICI KURALI: 5 ARAMADA BİR VE ARDINDAN HER 19 ARAMADA BİR GÜNCELLEME
if (toplamAramaSayisi === 5 || (toplamAramaSayisi > 5 && (toplamAramaSayisi - 5) % 19 === 0)) {
animsaticiGuncelle();
}

let aramaListesi = [];
if (aktifHavuz === "HEPSİ") aramaListesi = genelTekilHavuz;
else if (aktifHavuz === "SAĞLIK") aramaListesi = sozlukSaglik;
else if (aktifHavuz === "BİLİM") aramaListesi = sozlukBilim;
else if (aktifHavuz === "HAKLILIK") aramaListesi = sozlukHaklilik;
else if (aktifHavuz === "YAZILIM") aramaListesi = sozlukTgid;
else if (aktifHavuz === "ÇOKLUKLAR BİLİMİ") aramaListesi = sozlukCokluk;

// Çift yönlü arama: Hem yabancı sözcükte (A) hem de yerli karşılıkta (B) arar
let sonuc = aramaListesi.find(öge => öge.A === aranan || öge.B === aranan);
let sonucAlani = document.getElementById("sonucAlani");
let oneriGiris = document.getElementById("oneriGirisAlani");

if(sonuc) {
sonucAlani.innerHTML = `${sonuc.A}<br><br><span style="color:#0000CC;">${sonuc.B}</span>`;
oneriGiris.style.display = "none";
} else {
sonucAlani.innerHTML = `SÖZCÜK BULUNAMADI.<br>"${aranan}" hiçbir biriktiricimizde bulunamadı.`;

sonBulunamayanKelime = aranan;
document.getElementById("txtOneriKarsilik").placeholder = `"${aranan}" İÇİN TÜRKÇE ÖNERİN`;
oneriGiris.style.display = "block";

onerilereEkle(aranan);
}
}

// ANIMSATICININ SIRA İLE GÜNCELLENMESİ
function animsaticiGuncelle() {
if (genelTekilHavuz.length === 0) return;
let secilenSozcuk = genelTekilHavuz[animsaticiEndeks];
document.getElementById("animAlani").innerText = `${secilenSozcuk.A}`;
animsaticiEndeks = (animsaticiEndeks + 1) % genelTekilHavuz.length;
}

// ÖNERİ TOPLAMA VE LİSTELEME SİSTEMİ
function onerilereEkle(kelime) {
if (!bulunamayanlarSet.has(kelime)) {
bulunamayanlarSet.add(kelime);
let liste = document.getElementById("listeOneriler");

if (bulunamayanlarSet.size === 1) { liste.innerHTML = ""; }

let li = document.createElement("li");
li.innerText = kelime;
liste.appendChild(li);
}
}

function oneriGonder() {
let karsilikIcerik = document.getElementById("txtOneriKarsilik").value.trim().toUpperCase().replace(/i/g, "İ").replace(/ı/g, "I");
if(!karsilikIcerik) return;

let hedefHavuz = sozluk;
if (aktifHavuz === "SAĞLIK") hedefHavuz = sozlukSaglik;
else if (aktifHavuz === "BİLİM") hedefHavuz = sozlukBilim;
else if (aktifHavuz === "HAKLILIK") hedefHavuz = sozlukHaklilik;
else if (aktifHavuz === "YAZILIM") hedefHavuz = sozlukTgid;
else if (aktifHavuz === "ÇOKLUKLAR BİLİMİ") hedefHavuz = sozlukCokluk;

hedefHavuz.push({ "A": sonBulunamayanKelime, "B": karsilikIcerik });
sistemiKokenTemizleVeSirala();

document.getElementById("sonucAlani").innerHTML = `ÖNERİ KAYDEDİLDİ:<br>${sonBulunamayanKelime} = <span style="color:#0000CC;">${karsilikIcerik}</span>`;
document.getElementById("txtOneriKarsilik").value = "";
document.getElementById("oneriGirisAlani").style.display = "none";
}

function baskaSozcukSor() {
document.getElementById("txtAra").value = "";
document.getElementById("sonucAlani").innerHTML = "Arama sonuçları burada gösterilecek.";
document.getElementById("oneriGirisAlani").style.display = "none";
document.getElementById("txtAra").focus();
}
