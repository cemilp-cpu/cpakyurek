aramaSayisi++;
if(aramaSayisi % 10 === 0) {
animsaticiEndeks = (animsaticiEndeks + 5) % biriktirici.length;
animsaticiGuncelle();
}

gezilenler.add(hamGirdi);
localStorage.setItem('sozcuklukGezilenler', JSON.stringify(Array.from(gezilenler)));
document.getElementById('szGezdi').innerText = gezilenler.size;

const alan = document.getElementById('sonucAlani');
alan.innerHTML = "";

let bulunanSonuclar = [];
biriktirici.forEach(oge => {
if (oge.A === hamGirdi || oge.B === hamGirdi) {
bulunanSonuclar.push(oge);
}
});

if (bulunanSonuclar.length > 0) {
let icerik = `<div class="aciklama-metni">EŞLEŞEN TÜM KARŞILIKLAR LİSTELENİYOR:</div>`;
icerik += `<table class="sonuc-tablo">`;

bulunanSonuclar.forEach((o) => {
icerik += `
<tr class="sonuc-satir">
<td class="hucre-sol">${o.A}</td>
<td class="hucre-ok">➔</td>
<td class="hucre-sag">${o.B}</td>
</tr>`;
});

icerik += `</table>`;
alan.innerHTML = icerik;
} else {
alan.innerHTML = `
<div class="oneri-kutusu">
<label style="font-size:11px; color:#c62828;">BULUNAMADI. ÖNERİNİZ VARSA YAZAR MISINIZ?</label>
<div class="oneri-satir">
<input type="text" id="oneriTxt" class="oneri-girdi" placeholder="YALIN KARŞILIK..." oninput="this.value = this.value.toUpperCase();">
<button class="oneri-btn" onclick="oneriGonder('${hamGirdi}')">GÖNDER</button>
</div>
</div>`;
}
document.getElementById('girdiSozcuk').focus();
}

function havuzSec(isim) {
const alan = document.getElementById('sonucAlani');
alan.innerHTML = "";

let havuzElemanlari = biriktirici.filter(o => o.havuz === isim);

if(havuzElemanlari.length > 0) {
let icerik = `<div class="aciklama-metni">[${isim}] ALANINDAKİ TÜM SÖZCÜKLER SIRALANIYOR:</div>`;
icerik += `<table class="sonuc-tablo">`;
havuzElemanlari.forEach((o) => {
icerik += `
<tr class="sonuc-satir">
<td class="hucre-sol">${o.A}</td>
<td class="hucre-ok">➔</td>
<td class="hucre-sag">${o.B}</td>
</tr>`;
});
icerik += `</table>`;
alan.innerHTML = icerik;
} else {
alan.innerHTML = `<div class="aciklama-metni" style="color:red">[${isim}] ALANINDA HENÜZ TANIMLI SÖZCÜK YOK.</div>`;
}
document.getElementById('girdiSozcuk').focus();
}

function oneriGonder(eskiSozcuk) {
const oneri = document.getElementById('oneriTxt').value.trim().toUpperCase();
if(!oneri) return;

onerilerDeposu.push(`${eskiSozcuk} -> ${oneri}`);
yoneticiOnerileriniYenile();

const konu = encodeURIComponent("Sözcüklük Öneri");
const govde = encodeURIComponent(`Aranan Sözcük: ${eskiSozcuk}\nÖneri Karşılık: ${oneri}`);
window.location.href = `mailto:cemilp@gmail.com?subject=${konu}&body=${govde}`;
}

function yoneticiOdasiAc() {
let sifre = prompt("Gizli sözü giriniz:");
if(sifre === gizliSoz) {
document.getElementById('yoneticiPaneli').style.display = 'block';
} else if(sifre !== null) {
alert("Hatalı giriş!");
}
}

function yoneticiOnerileriniYenile() {
const alan = document.getElementById('yoneticiOneriler');
if(onerilerDeposu.length === 0) {
alan.innerText = "Henüz öneri yok.";
} else {
alan.innerHTML = "<ol>" + onerilerDeposu.map(o => `<li>${o}</li>`).join("") + "</ol>";
}
}

function temizle() {
document.getElementById('girdiSozcuk').value = "";
document.getElementById('sonucAlani').innerHTML = "";
document.getElementById('girdiSozcuk').focus();
}
</script>
</body>
</html>
