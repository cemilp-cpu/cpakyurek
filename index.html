<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sanal Yöre - Sözcüklük</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.25; }
        .kume-konteynir { display: flex; gap: 20px; }
        .kume { border: 1px solid #ccc; padding: 15px; width: 50%; }
        h2 { color: #2c3e50; border-bottom: 2px solid #eee; }
        .sozcuk-listesi { list-style: none; padding: 0; }
        .sozcuk-oesi { margin-bottom: 8px; padding: 5px; background: #f9f9f9; }
    </style>
</head>
<body>

    <h1>Sözcüklük Çalışması</h1>
    
    <div class="kume-konteynir">
        <!-- A Kümesi: Yabancı kökenli sözcükler -->
        <div class="kume" id="kumeA">
            <h2>A Kümesi (Yabancı Kökenli)</h2>
            <ul id="listeA" class="sozcuk-listesi"></ul>
        </div>

        <!-- B Kümesi: Önerilen Türkçe sözcükler -->
        <div class="kume" id="kumeB">
            <h2>B Kümesi (Önerilen Türkçe)</h2>
            <ul id="listeB" class="sozcuk-listesi"></ul>
        </div>
    </div>

    <!-- Verileri dış dosyadan çağıran bölüm -->
    <script src="ekler.js"></script>
    <script>
        // Veriler yüklendikten sonra listeleri dolduran işlev
        function listeleriGuncelle() {
            const listeA = document.getElementById('listeA');
            const listeB = document.getElementById('listeB');

            // sozcukVerileri, ekler.js dosyasından gelmektedir
            sozcukVerileri.forEach(oge => {
                let liA = document.createElement('li');
                liA.className = 'sozcuk-oesi';
                liA.textContent = oge.yabanci;
                listeA.appendChild(liA);

                let liB = document.createElement('li');
                liB.className = 'sozcuk-oesi';
                liB.textContent = oge.turkce;
                listeB.appendChild(liB);
            });
        }

        // Sayfa yüklendiğinde çalıştır
        window.onload = listeleriGuncelle;
    </script>
</body>
</html>
