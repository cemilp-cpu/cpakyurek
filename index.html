<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanal Yöre - SÖZCÜKLÜK</title>
<style>
/* 1. İSTEK: KESİN SARI YÜZEY */
html, body {
background-color: #ffffff !important;
margin: 0;
padding: 0;
height: 100vh;
font-family: sans-serif;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
}

.ana-konteynir {
width: 90%;
max-width: 800px;
background: #ffff00;
padding: 25px;
border-radius: 20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.1);
text-align: center;
}

/* 2. İSTEK: ÜSTTEKİ BAŞLIK KALDIRILDI, KUTU EN ÜSTTE */
.aciklama-kutusu {
font-size: 18px;
background: #add8e6;
padding: 15px;
border-radius: 12px;
margin-bottom: 20px;
border: 2px solid #d4c4a1;
line-height: 1.5;
font-weight: bold;
}

.arama-alani { display: flex; gap: 10px; margin-bottom: 20px; }

input {
flex: 2;
padding: 12px;
border: 3px solid #d4c4a1;
border-radius: 10px;
font-size: 20px;
outline: none;
text-transform: uppercase;
}

button {
padding: 12px 20px;
cursor: pointer;
font-weight: bold;
font-size: 16px;
border: none;
border-radius: 10px;
}

.btn-bul { background-color: #2c3e50; color: white; }
.btn-yeni { background-color: #95a5a6; color: white; }

.kumeler { display: flex; gap: 30px; margin-bottom: 15px; justify-content: center; }

.kume {
flex: 1;
padding: 12px;
border: 3px solid #d4c4a1;
border-radius: 15px;
background: #ffffff;
position: relative;
opacity: 0.1; /* Sönük başlangıç */
transition: 0.3s;
}

.ok {
font-size: 35px;
display: none;
position: absolute;
left: -40px;
top: 50%;
transform: translateY(-50%);
}

/* IŞIKLI OKLAR */
.aktif-a { opacity: 1 !important; border-color: #0000FF !important; background-color: #e6e6ff !important; box-shadow: 0 0 20px #0000FF; }
.aktif-a .ok { display: block; color: #0000FF; }

.aktif-b { opacity: 1 !important; border-color: #FF0000 !important; background-color: #ffe6e6 !important; box-shadow: 0 0 20px #FF0000; }
.aktif-b .ok { display: block; color: #FF0000; }

/* 3. İSTEK: SONUÇ VE ÖNERİ AYNI ALANDA */
.sonuc-paneli {
padding: 20px;
border-radius: 12px;
background: #fdfae5;
min-height: 120px;
border-left: 10px solid #2c3e50;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}

.oneri-bolumu {
display: none;
width: 100%;
margin-top: 10px;
}

.oneri-girdi {
display: flex;
gap: 10px;
justify-content: center;
margin-top: 10px;
}

.oneri-input {
width: 60%;
padding: 8px;
font-size: 16px;
border: 2px solid #2c3e50;
border-radius: 8px;
}
</style>
</head>
<body>

<div class="ana-konteynir">
<div class="aciklama-kutusu">
Önerilen yalın Türkçe sözcükler öneridir. Farklı sözcük önerilerinde bulunarak siz de katkıda bulunun. <br>
Bu bir sözlük değil, SÖZCÜKLÜTÜR.
</div>

<div class="arama-alani">
<input type="text" id="girdi" placeholder="SÖZCÜK YAZINIZ..." onkeydown="if(event.key==='Enter') bul()">
<button class="btn-bul" onclick="bul()">BUL / SOR</button>
<button class="btn-yeni" onclick="temizle()">BAŞKA SÖZCÜK SOR</button>
</div>

<div class="kumeler">
<div id="kumeA" class="kume">
<span class="ok">➤</span>
<strong>A KÜMESİ</strong><br>
<small>Yabancı kökenli yanıtlar</small>
</div>
<div id="kumeB" class="kume">
<span class="ok">➤</span>
<strong>B KÜMESİ</strong><br>
<small>Yalın Türkçe yanıtlar</small>
</div>
</div>

<div class="sonuc-paneli">
<div id="sonucMetni" style="font-size: 24px;">Sonuçlar burada listelenecek...</div>

<div id="oneriAlani" class="oneri-bolumu">
<div style="font-size: 24px;">Sizin öneriniz var mı?</div>
<div class="oneri-girdi">
<input type="text" id="oneriGirdisi" class="oneri-input" placeholder="Buraya yazınız...">
<button class="btn-bul" style="padding: 5px 15px;" onclick="alert('Kaydedildi!')">GÖNDER</button>
</div>
</div>
</div>
</div>

function bul() {
const kelime = document.getElementById('girdi').value.trim().toLocaleUpperCase('tr-TR');
const sonucMetni = document.getElementById('sonucMetni');
const oneriAlani = document.getElementById('oneriAlani');
const kA = document.getElementById('kumeA');
const kB = document.getElementById('kumeB');

sonucMetni.innerHTML = "";
oneriAlani.style.display = "none";
kA.className = "kume"; kB.className = "kume";

let found = false;
sozluk.forEach(k => {
if (k.A === kelime) {
sonucMetni.innerHTML = "1. " + k.B;
kA.classList.add('aktif-a');
found = true;
} else if (k.B === kelime) {
sonucMetni.innerHTML = "1. " + k.A;
kB.classList.add('aktif-b');
found = true;
}
});

if (!found && kelime !== "") {
sonucMetni.innerHTML = "Biriktiricimizde bulunamadı.";
oneriAlani.style.display = "block";
}
}

function temizle() {
document.getElementById('girdi').value = "";
document.getElementById('sonucMetni').innerHTML = "Yeni sözcük sorabilirsiniz...";
document.getElementById('oneriAlani').style.display = "none";
document.getElementById('kumeA').className = "kume";
document.getElementById('kumeB').className = "kume";
}
