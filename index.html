let aktifMod = "GENEL";

const GUN_KEY='sozcukluk_gun', GUN_SAYAC_KEY='sozcukluk_gunluk', TOP_SAYAC_KEY='sozcukluk_toplam', ONERI_KEY='sozcukluk_oneriler';
const hafiza={getItem:k=>{try{return localStorage.getItem(k)}catch(e){return null}},setItem:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}}};

function buBuyukHarfYap(element) {
element.value = element.value.toUpperCase();
}

function tamNormalize(metin) {
if (!metin) return "";
return metin.trim()
.toLocaleLowerCase('tr')
.replace(/ı/g, 'i')
.replace(/ö/g, 'o')
.replace(/ü/g, 'u')
.replace(/ç/g, 'c')
.replace(/ğ/g, 'g')
.replace(/ş/g, 's');
}

function sayaclariGuncelle(isSearch=false){
const bugun=new Date().toISOString().split('T')[0];
if(hafiza.getItem(GUN_KEY)!==bugun){hafiza.setItem(GUN_KEY,bugun);hafiza.setItem(GUN_SAYAC_KEY,'0')}
let g=parseInt(hafiza.getItem(GUN_SAYAC_KEY)||'0'), t=parseInt(hafiza.getItem(TOP_SAYAC_KEY)||'0');
if(isSearch){g++;t++;hafiza.setItem(GUN_SAYAC_KEY,g);hafiza.setItem(TOP_SAYAC_KEY,t);}
sayaclariYukle();
}

function sayaclariYukle(){
document.getElementById('sayacGun').textContent=hafiza.getItem(GUN_SAYAC_KEY)||'0';
document.getElementById('sayacTop').textContent=hafiza.getItem(TOP_SAYAC_KEY)||'0';
document.getElementById('sayacSozcuk').textContent=sozluk.length+sozlukSaglik.length+sozlukBilim.length+sozlukHaklilik.length+sozlukTgid.length+sozlukCokluk.length;
}

function modSec(mod){
const sBtn=document.getElementById('saglikBtn'), bBtn=document.getElementById('bilimBtn'), hBtn=document.getElementById('haklilikBtn'), tBtn=document.getElementById('tgidBtn'), cBtn=document.getElementById('coklukBtn'), gosterge=document.getElementById('modGosterge');
sBtn.style.boxShadow=bBtn.style.boxShadow=hBtn.style.boxShadow=tBtn.style.boxShadow=cBtn.style.boxShadow="none";

if(aktifMod===mod){
aktifMod="GENEL";
gosterge.innerHTML="";
} else {
aktifMod=mod;
if(mod==="SAGLIK") { sBtn.style.boxShadow="0 0 8px #2ecc71"; gosterge.innerHTML='<div class="mod-aktif" style="background:#e8f8f5;color:#27ae60;">SAĞLIK SATIRI SEÇİLDİ</div>'; }
else if(mod==="BILIM") { bBtn.style.boxShadow="0 0 8px #9b59b6"; gosterge.innerHTML='<div class="mod-aktif" style="background:#f4ecf7;color:#8e44ad;">BİLİM SATIRI SEÇİLDİ</div>'; }
else if(mod==="HAKLILIK") { hBtn.style.boxShadow="0 0 8px #e67e22"; gosterge.innerHTML='<div class="mod-aktif" style="background:#fdf2e9;color:#e67e22;">HAKLILIK SATIRI SEÇİLDİ</div>'; }
else if(mod==="TGID") { tBtn.style.boxShadow="0 0 8px #009688"; gosterge.innerHTML='<div class="mod-aktif" style="background:#e0f2f1;color:#009688;">TGİD SATIRI SEÇİLDİ</div>'; }
else if(mod==="COKLUK") { cBtn.style.boxShadow="0 0 8px #3f51b5"; gosterge.innerHTML='<div class="mod-aktif" style="background:#e8eaf6;color:#3f51b5;">ÇOKLUKLAR BİLİMİ SEÇİLDİ</div>'; }
temizleArama();
}
}

function bul(){
const girdiAlani = document.getElementById('girdi');
const hamGirdi = girdiAlani.value.trim().toUpperCase();
const normalizeArama = tamNormalize(hamGirdi);

const sonucMetni=document.getElementById('sonucMetni'), oneriAlani=document.getElementById('oneriAlani'), panel=document.getElementById('sonucPaneli');
sonucMetni.innerHTML=""; oneriAlani.style.display="none";
panel.removeAttribute("style"); panel.className="sonuc-paneli";

if(!hamGirdi){ return; }

let anaListe = [];
let modMetni = aktifMod;
if(aktifMod === "SAGLIK") { anaListe = sozlukSaglik; }
else if(aktifMod === "BILIM") { anaListe = sozlukBilim; }
else if(aktifMod === "HAKLILIK") { anaListe = sozlukHaklilik; }
else if(aktifMod === "TGID") { anaListe = sozlukTgid; }
else if(aktifMod === "COKLUK") { anaListe = sozlukCokluk; modMetni = "ÇOKLUKLAR BİLİMİ"; }
else { anaListe = sozluk; }

let bulunanlar = [];
let kumeTipi = "";
let gorulenKombinasyonlar = new Set();
let seciliHavuzdaBulundu = false;

if (aktifMod !== "GENEL") {
anaListe.forEach(k => {
const kA_Havuz = tamNormalize(k.A);
const kB_Havuz = tamNormalize(k.B);

if(kA_Havuz === normalizeArama){
let anahtar = k.A + "|||" + k.B;
if(!gorulenKombinasyonlar.has(anahtar)){
gorulenKombinasyonlar.add(anahtar);
bulunanlar.push({ aranan: k.A, karsilik: k.B });
if(!kumeTipi) kumeTipi = "A";
seciliHavuzdaBulundu = true;
}
} else if(kB_Havuz === normalizeArama){
let anahtar = k.B + "|||" + k.A;
if(!gorulenKombinasyonlar.has(anahtar)){
gorulenKombinasyonlar.add(anahtar);
bulunanlar.push({ aranan: k.B, karsilik: k.A });
if(!kumeTipi) kumeTipi = "B";
seciliHavuzdaBulundu = true;
}
}
});
}

if (!seciliHavuzdaBulundu) {
let tumHavuzlar = [...sozluk, ...sozlukSaglik, ...sozlukBilim, ...sozlukHaklilik, ...sozlukTgid, ...sozlukCokluk];
tumHavuzlar.forEach(k => {
const kA_Havuz = tamNormalize(k.A);
const kB_Havuz = tamNormalize(k.B);

if(kA_Havuz === normalizeArama){
let anahtar = k.A + "|||" + k.B;
if(!gorulenKombinasyonlar.has(anahtar)){
gorulenKombinasyonlar.add(anahtar);
bulunanlar.push({ aranan: k.A, karsilik: k.B });
if(!kumeTipi) kumeTipi = "A";
}
} else if(kB_Havuz === normalizeArama){
let anahtar = k.B + "|||" + k.A;
if(!gorulenKombinasyonlar.has(anahtar)){
gorulenKombinasyonlar.add(anahtar);
bulunanlar.push({ aranan: k.B, karsilik: k.A });
if(!kumeTipi) kumeTipi = "B";
}
}
});
}

if(bulunanlar.length > 0){
sayaclariGuncelle(true);

if (aktifMod !== "GENEL" && !seciliHavuzdaBulundu) {
panel.style.backgroundColor = "#f5f5f5";
panel.style.border = "2px dashed #7f8c8d";
sonucMetni.innerHTML = `<div style="color:#d35400; font-size:11px; margin-bottom:6px; font-weight:bold; width:100%; text-align:center;">⚠️ BU SÖZCÜK ${modMetni} SATIRINDA BULUNAMADI;<br>GENEL BİRİKTİRİCİDEN GETİRİLMİŞTİR:</div>`;
} else {
if(kumeTipi === "A"){ panel.className = "sonuc-paneli yanit-mavi"; }
else { panel.className = "sonuc-paneli yanit-kirmizi"; }
}

let html = `<div class="sonuc-listesi">`;
bulunanlar.forEach((b, index) => {
html += `<div class="sonuc-maddesi">${index + 1}- <strong>${b.aranan}</strong> = <span style="color:red; font-size:14px; font-weight:bold;">${b.karsilik}</span></div>`;
});
html += `</div>`;
sonucMetni.innerHTML += html;
} else {
panel.className = "sonuc-paneli yanit-bulunamadi";
sonucMetni.innerHTML = `SÖZCÜK BULUNAMADI.<br><span style="font-size:11px;color:#555;">"${hamGirdi}" hiçbir biriktiricimizde bulunamadı.</span>`;
oneriAlani.style.display = "block";
document.getElementById('oneriGirdisi').value = "";
document.getElementById('oneriGirdisi').placeholder = hamGirdi + " için Türkçe öneriniz";
document.getElementById('oneriGirdisi').dataset.kayipSozcuk = hamGirdi;
}
setTimeout(() => { girdiAlani.focus(); girdiAlani.select(); }, 20);
}

function oneriKaydet() {
const oneriInput = document.getElementById('oneriGirdisi');
const kayipSozcuk = oneriInput.dataset.kayipSozcuk.toUpperCase();
const kullaniciOnerisi = oneriInput.value.trim().toUpperCase();

if(!kullaniciOnerisi) return;

let mevcutOneriler = JSON.parse(hafiza.getItem(ONERI_KEY) || "[]");
mevcutOneriler.push({ sozcuk: kayipSozcuk, oneri: kullaniciOnerisi, tarih: new Date().toLocaleString('tr-TR') });
hafiza.setItem(ONERI_KEY, JSON.stringify(mevcutOneriler));

document.getElementById('oneriAlani').style.display = "none";
document.getElementById('sonucMetni').innerHTML = `<span style="color:green;">Öneriniz yönetici bilgisine sunulmak üzere anımsatıcı düzeneğe kaydedildi.</span>`;
yoneticiListesiniYenile();
}

function yoneticiGirisCikis() {
const btn = document.getElementById('yoneticiBtn');
const pnl = document.getElementById('yoneticiPaneli');
if(!yoneticiModu) {
let sifre = prompt("Yönetici giriş şifresini giriniz:");
if(sifre === "1973") {
yoneticiModu = true;
btn.textContent = "YÖNETİCİ ÇIKIŞI";
pnl.style.display = "block";
yoneticiListesiniYenile();
} else if(sifre !== null) {
alert("Hatalı şifre!");
}
} else {
yoneticiModu = false;
btn.textContent = "YÖNETİCİ GİRİŞİ";
pnl.style.display = "none";
}
}

function yoneticiListesiniYenile() {
const listeKutusu = document.getElementById('yoneticiListesi');
let mevcutOneriler = JSON.parse(hafiza.getItem(ONERI_KEY) || "[]");
if(mevcutOneriler.length === 0) {
listeKutusu.innerHTML = "Henüz yeni öneri yok.";
return;
}
let html = "";
mevcutOneriler.forEach((o, i) => {
html += `${i+1}. ${o.sozcuk} -> <strong>${o.oneri}</strong> <br>`;
});
listeKutusu.innerHTML = html;
}

function onerileriTemizle() {
if(confirm("Tüm öneri listesini temizlemek istediğinize emin misiniz?")) {
hafiza.setItem(ONERI_KEY, "[]");
yoneticiListesiniYenile();
}
}

function havuzaTekilEkle() {
const girdiAlani = document.getElementById('yeniTopluGirdi');
const raporAlani = document.getElementById('eklemeDurumRaporu');
const satirlar = girdiAlani.value.split('\n');

let eklenenSayisi = 0;
let tekrarEdenSayisi = 0;

let hedefHavuz = sozluk;
if(aktifMod === "SAGLIK") hedefHavuz = sozlukSaglik;
else if(aktifMod === "BILIM") hedefHavuz = sozlukBilim;
else if(aktifMod === "HAKLILIK") hedefHavuz = sozlukHaklilik;
else if(aktifMod === "TGID") hedefHavuz = sozlukTgid;
else if(aktifMod === "COKLUK") hedefHavuz = sozlukCokluk;

satirlar.forEach(function(satir) {
let temizSatir = satir.replace(/^[\d.\s]+/g, '').trim();
if (temizSatir.length > 0) {
let parcalar = temizSatir.split(/\s+(.+)/);
let kelimeA = parcalar[0] ? parcalar[0].trim().toUpperCase() : "";
let kelimeB = parcalar[1] ? parcalar[1].trim().toUpperCase() : "";

if(kelimeA && !kelimeB) {
kelimeB = "TANIMSIZ";
}

if(kelimeA && kelimeB) {
let zatenVarMi = hedefHavuz.some(function(o) {
return tamNormalize(o.A) === tamNormalize(kelimeA);
});

if(!zatenVarMi) {
hedefHavuz.push({ A: kelimeA, B: kelimeB });
eklenenSayisi++;
} else {
tekrarEdenSayisi++;
}
}
}
});

hedefHavuz.sort(function(a, b) {
return a.A.localeCompare(b.A, 'tr');
});

sayaclariYukle();
girdiAlani.value = "";
raporAlani.innerHTML = `${aktifMod} havuzuna ${eklenenSayisi} yeni sözcük eklendi. ${tekrarEdenSayisi} mükerrer kelime engellendi.`;
}

function temizleArama() {
document.getElementById('sonucMetni').innerHTML="Arama sonuçları burada listelenecek...";
document.getElementById('oneriAlani').style.display="none";
document.getElementById('sonucPaneli').removeAttribute("style");
document.getElementById('sonucPaneli').className="sonuc-paneli";
}

function temizle(){
const girdiAlani = document.getElementById('girdi');
girdiAlani.value="";
temizleArama();
setTimeout(() => { girdiAlani.focus(); }, 20);
}

window.onload = function() {
sayaclariYukle();
const girdiAlani = document.getElementById('girdi');
girdiAlani.focus();
};
