<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sanal Yöre - SÖZCÜKLÜK</title>
<style>
html, body {
background: #fff;
margin: 0;
padding: 0;
height: 100%;
min-height: 100vh;
font-family: sans-serif;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
}
.ana-konteynir {
width: 100%;
max-width: 500px;
height: 100vh;
background: #ff0;
padding: 10px;
box-shadow: 0 5px 15px rgba(0,0,0,.1);
box-sizing: border-box;
display: flex;
flex-direction: column;
justify-content: space-between;
}
.sol-ust-tanitici {
text-align: left;
font-size: 12px;
font-weight: bold;
color: #333;
margin-bottom: 4px;
display: flex;
align-items: center;
justify-content: space-between;
}
.kizil-yildiz { color: red; font-size: 14px; margin-right: 3px; }
.aciklama-kutusu {
font-size: 11px;
padding: 6px;
border-radius: 8px;
margin-bottom: 6px;
border: 1px solid #b0c4de;
font-weight: bold;
text-align: center;
line-height: 1.2;
color: #fff;
background-color: #3498db;
}
.arama-alani { margin-bottom: 6px; }
input {
width: 100%;
padding: 10px;
border: 2px solid #d4c4a1;
border-radius: 8px;
font-size: 18px;
outline: none;
box-sizing: border-box;
text-align: center;
font-weight: bold;
}
.buton-grubu {
display: flex;
flex-direction: column;
gap: 5px;
margin-bottom: 6px;
}
.buton-satiri {
display: flex;
gap: 4px;
justify-content: center;
}
.buton-satiri button {
flex: 1;
padding: 8px 4px;
font-weight: bold;
font-size: 11px;
border: none;
border-radius: 6px;
cursor: pointer;
text-transform: uppercase;
}
.btn-bul { background: #555; color: #fff; }
.btn-yeni { background: #e74c3c; color: #fff; }
.btn-saglik { background: #2ecc71; color: #fff; }
.btn-bilim { background: #9b59b6; color: #fff; }
.btn-haklilik { background: #e67e22; color: #fff; }
.btn-tgid { background: #009688; color: #fff; }
.btn-cokluk { background: #3f51b5; color: #fff; }

.kumeler {
display: flex;
gap: 8px;
margin-bottom: 6px;
justify-content: center;
}
.kume {
flex: 1;
padding: 5px;
border: 2px solid #d4c4a1;
border-radius: 8px;
background: #fff;
opacity: .2;
text-align: center;
position: relative;
}
.kume strong { font-size: 11px; display: block; }
.kume small { font-size: 9px; display: block; color: #666; margin-top: 1px; }
.ok { font-size: 12px; display: none; position: absolute; left: 4px; top: 50%; transform: translateY(-50%); }

.aktif-a { opacity: 1!important; border-color: #00f!important; background: #e6e6ff!important; }
.aktif-a .ok { display: block; color: #00f; }
.aktif-b { opacity: 1!important; border-color: red!important; background: #ffe6e6!important; }
.aktif-b .ok { display: block; color: red; }

.sonuc-paneli {
padding: 8px;
border-radius: 8px;
background: #fff;
border: 1px solid #d4c4a1;
flex-grow: 1;
min-height: 100px;
max-height: 40vh;
display: flex;
flex-direction: column;
justify-content: flex-start;
align-items: center;
margin-bottom: 6px;
overflow-y: auto;
}
#sonucMetni { font-size: 14px; font-weight: bold; text-align: center; line-height: 1.3; width: 100%; color: #2c3e50; }
.sonuc-listesi { text-align: left; width: 100%; display: flex; flex-direction: column; gap: 3px; }
.sonuc-maddesi { padding: 5px; border-bottom: 1px dashed #ccc; font-size: 14px; color: #2c3e50; line-height: 1.2; }

.yanit-mavi { background: #add8e6!important; border: 2px solid #00f; }
.yanit-kirmizi { background: #ffe6e6!important; border: 2px solid red; }
.yanit-bulunamadi { background: #fff!important; color: red!important; border: 1px solid #ccc; }

.oneri-bolumu { display: none; width: 100%; margin-top: 4px; text-align: center; }
.oneri-girdi { display: flex; gap: 4px; justify-content: center; margin-top: 4px; }
.oneri-input { width: 60%; padding: 4px; font-size: 12px; border: 1px solid #555; border-radius: 4px; font-weight: bold; text-align: center; }

.alt-sayac-alani {
border-top: 1px solid rgba(0,0,0,.15);
text-align: center;
font-size: 10px;
color: #2c3e50;
font-weight: 600;
background: #fff;
border-radius: 5px;
padding: 3px;
}
.alt-sayac-alani span { color: #e74c3c; font-weight: 900; font-size: 13px; }
.mod-aktif { border: 1px solid #2c3e50; padding: 4px; border-radius: 5px; margin-bottom: 4px; text-align: center; font-weight: bold; font-size: 11px; width: 100%; box-sizing: border-box; text-transform: uppercase; }
</style>
</head>
<body>
<div class="ana-konteynir">
<div class="sol-ust-tanitici">
<span><span class="kizil-yildiz">★</span>Cemil Pakyürek / Sü:3</span>
</div>
<div id="modGosterge"></div>
<div class="aciklama-kutusu">Önerilen yalın Türkçe sözcükler öneridir. Farklı sözcük önerilerinde bulunarak siz de katkıda bulunun. <br>Bu bir sözlük değil, SÖZCÜKLÜKTÜR.</div>

<div class="arama-alani">
<input type="text" id="girdi" placeholder="YABANCI KÖKENLİ VEYA SÖZCÜK SOR" autocomplete="off">
</div>

<div class="buton-grubu">
<div class="buton-satiri">
<button class="btn-bul" onclick="bul()">BUL</button>
<button class="btn-yeni" onclick="temizle()">BAŞKA SÖZCÜK SOR</button>
</div>
<div class="buton-satiri">
<button class="btn-saglik" id="saglikBtn" onclick="modSec('SAGLIK')">SAĞLIK</button>
<button class="btn-bilim" id="bilimBtn" onclick="modSec('BILIM')">BİLİM</button>
<button class="btn-haklilik" id="haklilikBtn" onclick="modSec('HAKLILIK')">HAKLILIK</button>
</div>
<div class="buton-satiri">
<button class="btn-tgid" id="tgidBtn" onclick="modSec('TGID')">TGİD</button>
<button class="btn-cokluk" id="coklukBtn" onclick="modSec('COKLUK')">ÇOKLUKLAR BİLİMİ</button>
</div>
</div>

<div class="kumeler">
<div id="kumeA" class="kume"><span class="ok">➤</span><strong>A KÜMESİ</strong><small>Yabancı kökenli küme</small></div>
<div id="kumeB" class="kume"><span class="ok">➤</span><strong>B KÜMESİ</strong><small>Yalın Türkçe küme</small></div>
</div>

<div class="sonuc-paneli" id="sonucPaneli">
<div id="sonucMetni">Arama sonuçları burada listelenecek...</div>
<div id="oneriAlani" class="oneri-bolumu">
<div class="oneri-girdi">
<input type="text" id="oneriGirdisi" class="oneri-input">
<button class="btn-bul" style="padding:2px 6px;width:auto;font-size:11px;background:#555;" onclick="alert('Kaydedildi!')">GÖNDER</button>
</div>
</div>
</div>

<div class="alt-sayac-alani">
GEZİYOR: <span id="sayacGun">0</span> | GEZDİ: <span id="sayacTop">0</span> | TOPLAM SÖZCÜK: <span id="sayacSozcuk">0</span>
</div>
</div>

<script>
// ==========================================
// TİRENG YAPISI - ÖZGÜN SÖZCÜK HAVUZLARINIZ
// ==========================================
const sozluk = [];
const sozlukSaglik = [
{ A: "ASTIM", B: "SOLUMA YETERSİZLİĞİ" },
{ A: "HEKİM", B: "SAĞLIK BİLEN" },
{ A: "ÇOCUK DİŞ HEKİMLİĞİ", B: "ÇOCUK DİŞ SAĞLIK BİLENLİĞİ" },
{ A: "AFAROZ", B: "DIŞLAMA" },
{ A: "HİJYEN", B: "YAYILGAN CANLICIKSIZ" },
{ A: "DEZENFEKTE", B: "BULAŞMAZ" },
{ A: "KRONİK", B: "SÜREGEN" },
{ A: "AKUT", B: "GEÇİCİ" },
{ A: "KRONİK", B: "SÜREGEN" },
{ A: "EPİKRİZ", B: "DAŞLANGICI BİTİŞİ KAPSAR" },
{ A: "SYMPTOM", B: "BELİRTİ " }, 
{ A: "SEMPTOM", B: "SEMPTOM" }
];
const sozlukHaklilik = [
{ A: "ADALET", B: "GERÇEKLERE BAĞLILIK" }
];
const sozlukBilim = [
{ A: "ALGORITHM", B: "ÇÖZÜM ADIMLARI" },
{ A: "ASİT", B: "EKŞİT" },
{ A: "ALGORİTMA", B: "ÇÖZÜM ADIMLARI" },
{ A: "ALGEBRA", B: "SESADLI İŞLEMLER" },
{ A: "CEBİR", B: "SESARLI İŞLEMLER" },
{ A: "HARF", B: "SESADI" },
{ A: "RAKAM", B: "AÇISAY" },
{ A: "TELEVİZYON", B: "SANALGI" },
{ A: "RADYO", B: "ÜNALGI" },
{ A: "ASANSÖR", B: "DÜŞEYTAŞIT" },
{ A: "LİFT", B: "DÜŞEY TAIT" },
{ A: "ESCALATOR", B: "YÜRÜYEN MERDİVEN" },
{ A: "ELEKTRON", B: "EKSİCİK" },
{ A: "PROTON", B: "ARTICIK" },
{ A: "NÖTRON", B: "AĞIRCIK" },
{ A: "FİZİK", B: "ÖGECİKSEL İTİŞİM" },
{ A: "KİMYA", B: "ÖGECİKSEL BİRLEŞİM" }, 
{ A: "ATOM", B: "ÖGECİK" }
];
const sozlukTgid = [
{ A: "DATA", B: "VERİ" }
];
const sozlukCokluk = [
{ A: "SİNÜS", B: "BOŞLUK" }
];

let aktifMod = "GENEL";
const GUN_KEY='sozcukluk_gun', GUN_SAYAC_KEY='sozcukluk_gunluk', TOP_SAYAC_KEY='sozcukluk_toplam';
const hafiza={getItem:k=>{try{return localStorage.getItem(k)}catch(e){return null}},setItem:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}}};

// Türkçe harf eşleme motoru (Arama doğruluğu için arka planda kullanılır)
function turkceBuyut(metin) {
if (!metin) return "";
let harfler = { "i": "İ", "ı": "I", "ş": "Ş", "ğ": "Ğ", "ü": "Ü", "ö": "Ö", "ç": "Ç" };
return metin.replace(/[iışğüöç]/g, function(h) { return harfler[h]; }).toUpperCase();
}

function sayaclariGuncelle(isSearch=false){
const bugun=new Date().toISOString().split('T')[0];
if(hafiza.getItem(GUN_KEY)!==bugun){hafiza.setItem(GUN_KEY,bugun);hafiza.setItem(GUN_SAYAC_KEY,'0')}
let g=parseInt(hafiza.getItem(GUN_SAYAC_KEY)||'0'), t=parseInt(hafiza.getItem(TOP_SAYAC_KEY)||'0');
if(isSearch){g++;t++;hafiza.setItem(GUN_SAYAC_KEY,g);hafiza.setItem(TOP_SAYAC_KEY,t);}
sayaclariYukle();
}

function sayaclariYukle(){
document.getElementById('sayacGun').textContent=hafiza.getItem(GUN_SAYAC_KEY)||'0';
document.getElementById('sayacTop').textContent=hafiza.getItem(TOP_SAYAC_KEY)||'0';
document.getElementById('sayacSozcuk').textContent=sozluk.length+sozlukSaglik.length+sozlukBilim.length+sozlukHaklilik.length+sozlukTgid.length+sozlukCokluk.length;
}

function modSec(mod){
const sBtn=document.getElementById('saglikBtn'), bBtn=document.getElementById('bilimBtn'), hBtn=document.getElementById('haklilikBtn'), tBtn=document.getElementById('tgidBtn'), cBtn=document.getElementById('coklukBtn'), gosterge=document.getElementById('modGosterge');
sBtn.style.boxShadow=bBtn.style.boxShadow=hBtn.style.boxShadow=tBtn.style.boxShadow=cBtn.style.boxShadow="none";

if(aktifMod===mod){
aktifMod="GENEL";
gosterge.innerHTML="";
} else {
aktifMod=mod;
if(mod==="SAGLIK") { sBtn.style.boxShadow="0 0 8px #2ecc71"; gosterge.innerHTML='<div class="mod-aktif" style="background:#e8f8f5;color:#27ae60;">SAĞLIK SATIRI SEÇİLDİ</div>'; }
else if(mod==="BILIM") { bBtn.style.boxShadow="0 0 8px #9b59b6"; gosterge.innerHTML='<div class="mod-aktif" style="background:#f4ecf7;color:#8e44ad;">BİLİM SATIRI SEÇİLDİ</div>'; }
else if(mod==="HAKLILIK") { hBtn.style.boxShadow="0 0 8px #e67e22"; gosterge.innerHTML='<div class="mod-aktif" style="background:#fdf2e9;color:#e67e22;">HAKLILIK SATIRI SEÇİLDİ</div>'; }
else if(mod==="TGID") { tBtn.style.boxShadow="0 0 8px #009688"; gosterge.innerHTML='<div class="mod-aktif" style="background:#e0f2f1;color:#009688;">TGİD SATIRI SEÇİLDİ</div>'; }
else if(mod==="COKLUK") { cBtn.style.boxShadow="0 0 8px #3f51b5"; gosterge.innerHTML='<div class="mod-aktif" style="background:#e8eaf6;color:#3f51b5;">ÇOKLUKLAR BİLİMİ SEÇİLDİ</div>'; }
temizle();
}
}

// ARANAN SÖZCÜĞÜ ÇİFT YÖNLÜ OLARAK SEPETE ATAN VE SIRALAYAN KESİN MOTOR
function bul(){
const girdiAlani = document.getElementById('girdi');
const hamGirdi = girdiAlani.value.trim(); // Girilen ham sözcük
const kelimeArama = turkceBuyut(hamGirdi);

const sonucMetni=document.getElementById('sonucMetni'), oneriAlani=document.getElementById('oneriAlani'), kA=document.getElementById('kumeA'), kB=document.getElementById('kumeB'), panel=document.getElementById('sonucPaneli');

sonucMetni.innerHTML=""; oneriAlani.style.display="none"; kA.className="kume"; kB.className="kume"; panel.className="sonuc-paneli";

if(!hamGirdi){ return; }

let liste=sozluk;
if(aktifMod==="SAGLIK") liste=sozlukSaglik;
if(aktifMod==="BILIM") liste=sozlukBilim;
if(aktifMod==="HAKLILIK") liste=sozlukHaklilik;
if(aktifMod==="TGID") liste=sozlukTgid;
if(aktifMod==="COKLUK") liste=sozlukCokluk;

let bulunanlar=[], kumeTipi="";

liste.forEach(k=>{
const kA_Havuz=turkceBuyut(k.A.trim());
const kB_Havuz=turkceBuyut(k.B.trim());

// 1. Durum: Aranan A kümesinde bulundu -> Karşılığı B'den çekilir
if(kA_Havuz === kelimeArama){
bulunanlar.push({ aranan: k.A, karsilik: k.B });
if(!kumeTipi) kumeTipi="A";
}
// 2. Durum: Aranan B kümesinde bulundu -> Karşılığı A'dan çekilir
else if(kB_Havuz === kelimeArama){
bulunanlar.push({ aranan: k.B, karsilik: k.A });
if(!kumeTipi) kumeTipi="B";
}
});

if(bulunanlar.length > 0){
sayaclariGuncelle(true);
if(kumeTipi === "A"){ kA.className="kume aktif-a"; panel.className="sonuc-paneli yanit-mavi"; }
else { kB.className="kume aktif-b"; panel.className="sonuc-paneli yanit-kirmizi"; }

// Bulunanları uydurmadan, 1-, 2-, şeklinde sıralayarak sepete sergileme alanı
let html = `<div class="sonuc-listesi">`;
bulunanlar.forEach((b, index) => {
html += `<div class="sonuc-maddesi">${index + 1}- <strong>${b.aranan}</strong> = <span style="color:red; font-size:15px; font-weight:bold;">${b.karsilik}</span></div>`;
});
html += `</div>`;
sonucMetni.innerHTML = html;
} else {
panel.className="sonuc-paneli yanit-bulunamadi";
sonucMetni.innerHTML = `SÖZCÜK BULUNAMADI.<br><span style="font-size:12px;color:#555;">"${hamGirdi}" biriktiricimizde bulunamadı.</span>`;
oneriAlani.style.display = "block";
document.getElementById('oneriGirdisi').value = hamGirdi;
}
setTimeout(() => { girdiAlani.focus(); }, 20);
}

function temizle(){
const girdiAlani = document.getElementById('girdi');
girdiAlani.value="";
document.getElementById('oneriGirdisi').value = "";
document.getElementById('sonucMetni').innerHTML="Arama sonuçları burada listelenecek...";
document.getElementById('oneriAlani').style.display="none";
document.getElementById('kumeA').className="kume";
document.getElementById('kumeB').className="kume";
document.getElementById('sonucPaneli').className="sonuc-paneli";
setTimeout(() => { girdiAlani.focus(); }, 20);
}

window.onload = function() {
sayaclariYukle();
const girdiAlani = document.getElementById('girdi');
girdiAlani.focus();
};
</script>
</body>
</html>
