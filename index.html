function sayaciGuncelle() {
document.getElementById('dinamik-sayac').innerText = "10.000 / " + biriktirici.length;
}

function bul() {
const kutu = document.getElementById('soru');
// Arka planda büyük harf ve Türkçe karakter esnekliği (Kullanıcı görmez)
const hamGiris = kutu.value.trim();
const islenmisGiris = hamGiris.toUpperCase().replace(/i/g, "İ");
const yanitAlani = document.getElementById('yanit-liste');

// Arama: Her iki yönde de denetle
let sonuc = biriktirici.find(x => x.arama === islenmisGiris || x.dogru === islenmisGiris);

if (sonuc) {
let karsilik;
if (sonuc.arama === islenmisGiris) {
karsilik = sonuc.dogru;
kutu.className = "arama-kutusu kume-a"; // A Kümesi rengi
} else {
karsilik = sonuc.arama;
kutu.className = "arama-kutusu kume-b"; // B Kümesi rengi
}
yanitAlani.innerHTML = `<div style='font-size:1.5rem; text-align:center;'><strong>${karsilik}</strong></div>`;
} else {
kutu.className = "arama-kutusu"; // Bulunamazsa renk sıfırlanır
yanitAlani.innerHTML = `<button class="dugme" onclick="alert('Arka Oda Kayıt Modülü')">ARKA ODA'YA BİLDİR</button>`;
}
}

function sifirla() {
const kutu = document.getElementById('soru');
kutu.value = "";
kutu.className = "arama-kutusu";
document.getElementById('yanit-liste').innerHTML = "";
kutu.focus(); // B2'ye dönüş (Odaklanma)
}

window.onload = sayaciGuncelle;
