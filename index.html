function buHarfleriBuyut(nesne) {
nesne.value = nesne.value.toUpperCase();
}

function sozcukBul() {
const aranan = document.getElementById('sozcuk-sor').value;
const yanitAlani = document.getElementById('yanit-alani');
const girisKutusu = document.getElementById('sozcuk-sor');

// Arka oda doğrulaması (Basit eşleştirme)
const sonuc = sozcukler.find(s => s.arama === aranan);

if (sonuc) {
yanitAlani.style.backgroundColor = sonuc.renk;
girisKutusu.style.backgroundColor = sonuc.renk;
yanitAlani.innerHTML = `<strong>BULUNDU:</strong> ${sonuc.dogru}`;
} else {
yanitAlani.style.backgroundColor = "#ffc107";
yanitAlani.classList.add("oneri-vurgu");
yanitAlani.innerHTML = `
<p>Biriktiricimizde bulunamadı. Sizin öneriniz var mı?</p>
<input type="text" placeholder="Öneriniz..." style="width:80%">
<input type="text" placeholder="E-ileti adresiniz..." style="width:80%">
<button class="dugme" onclick="katkiTesekkur()">GÖNDER</button>
`;
}
}

function sifirla() {
document.getElementById('sozcuk-sor').value = "";
document.getElementById('sozcuk-sor').style.backgroundColor = "white";
const yanit = document.getElementById('yanit-alani');
yanit.innerHTML = "";
yanit.style.backgroundColor = "transparent";
yanit.classList.remove("oneri-vurgu");
document.getElementById('sozcuk-sor').focus();
}

function katkiTesekkur() {
alert("Katkınız nedeni ile övgülerimizi sunarız. Bilgiler yöneticiye iletildi.");
sifirla();
}

function yoneticiGirisi() {
const sifre = prompt("Gizli Sözü Giriniz:");
if (sifre === "100426") {
alert("Yönetici Arka Odasına Hoş Geldiniz, Sayın Pakyürek. Düzeltilecekler listesi açılıyor...");
} else {
alert("Giriş Engellendi.");
}
}
