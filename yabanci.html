<!DOCTYPE html> <html lang="tr"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>YABANCIYA YALIN SÖZCÜKLER</title> <style> body { background: #FFA500; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; } .kutu { background: white; width: 90%; max-width: 400px; border: 5px solid #FFD700; border-radius: 15px; padding: 10px; box-shadow: 0 0 20px #000; } .baslik { background: red; color: white; padding: 8px; font-size: 18px; font-weight: bold; text-align: center; } .mavi { background: blue; color: white; padding: 8px; font-size: 14px; text-align: center; } .turuncu { background: #FF4500; color: white; padding: 6px; font-size: 16px; font-weight: bold; text-align: center; } .arama { width: 95%; padding: 8px; margin: 8px 0; font-size: 16px; border: 2px solid orange; } .btn { background: green; color: white; border: none; padding: 8px 10px; margin: 3px; font-size: 14px; border-radius: 5px; cursor: pointer; } .btn-baska { background: orange; } .sonuc { margin-top: 10px; font-size: 16px; text-align: left; min-height: 60px; } .oneri-kutu { display:none; margin-top:10px; } .oneri-kutu textarea { width: 95%; height: 60px; } .geri { background: #FFD700; border: 2px solid orange; padding: 8px; margin-top: 10px; font-size: 13px; } a { color: blue; } </style> </head> <body> <div class="kutu"> <div class="baslik">YABANCIYA YALIN SÖZCÜKLER</div> <div class="mavi">Bu bir sözlük değil, SÖZCÜKLÜKTÜR.<br>Önerilen yalın Türkçe sözcükler sunulur.</div> <div class="turuncu">GÖZ SAĞLIĞI SÖZCÜKLERİ</div> <input type="text" id="ara" class="arama" placeholder="YABAN kelime yaz..."> <button class="btn" onclick="bul()">BUL</button> <button class="btn btn-baska" onclick="baskaSozcuk()">BAŞKA SÖZCÜK</button> <button class="btn" onclick="onerKutusu()">ÖNERİ GÖNDER</button> <div id="sonuc" class="sonuc"></div> <div id="oneri" class="oneri-kutu"> <b>YALIN ÖNERİNİ YAZ:</b><br> <textarea id="oneriMetin" placeholder="Örn: ATROFİ = KURUMA"></textarea><br> <button class="btn" onclick="onerGonder()">YÖNETİCİYE GÖNDER</button> </div> <div class="geri"> Bulamadıklarınızı önerin. Öneriniz yöneticiye gidecek: <a href="mailto:cemilp@gmail.com">cemilp@gmail.com</a> </div> </div> <script> const sozluk = { "MACULA": {y: "ÖZİÇ NOKTASI", a: "Net görmeyi sağlayan orta nokta"}, "RETINA": {y: "AĞ KATMANI", a: "Gözün arkasındaki ışık alıcı ağ"}, "KOROID": {y: "ŞARLAK", a: "AĞ KATMANI'nı besleyen damar tabakası"}, "DRUZEN": {y: "GÖZÖLEN", a: "AĞ KATMANI altında biriken artık"}, "ATROFI": {y: "YETERSİZLEŞME", a: "İncelme, zayıflama"}, "ATROFİ": {y: "YETERSİZLEŞME", a: "İncelme, zayıflama"}, "VITREUS": {y: "CAMSI SIVI", a: "Gözün içindeki jöle"} }; function bul(){ let k = document.getElementById("ara").value.toUpperCase().replace(/İ/g,'I'); let s = sozluk[k]; if(s){ document.getElementById("sonuc").innerHTML = `<b>YABAN:</b> ${document.getElementById("ara").value}<br><b>YALIN:</b> ${s.y}<br><b>AÇIKLAMA:</b> ${s.a}`; } else { document.getElementById("sonuc").innerHTML = "Bulunamadı. Aşağıdan öneri gönderin."; } } function baskaSozcuk(){ document.getElementById("ara").value = ""; document.getElementById("sonuc").innerHTML = ""; document.getElementById("oneri").style.display = "none"; document.getElementById("ara").focus(); } function onerKutusu(){ document.getElementById("oneri").style.display = "block"; } function onerGonder(){ let yaban = document.getElementById("ara").value; let yalin = document.getElementById("oneriMetin").value; let konu = "Yeni Sözcük Önerisi"; let icerik = `YABAN: ${yaban}%0AYALIN ÖNERİ: ${yalin}`; window.location.href = `mailto:cemilp@gmail.com?subject=${konu}&body=${icerik}`; } </script> </body> </html>
