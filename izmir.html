<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>YABANCIYA YALIN SOZCUKLER</title>
<style>
body{margin:0;background:#dcdcdc;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial}
.ana{width:500px;border:3px solid #000;border-radius:5px;box-shadow:3px 3px 10px #000;background:#fff}
.ustbant{background:#8B0000;color:#FFD700;text-align:center;padding:8px;font-size:13px;font-weight:bold}
.altbaslik{background:#a00000;color:#fff;text-align:center;padding:6px;font-size:14px;font-weight:bold}
.b2{background:#001a70;color:#fff;text-align:center;padding:8px;font-size:12px}
.b3{background:#a00000;color:#fff;text-align:center;padding:8px;font-size:11px}
.beyaz{background:#fff;padding:12px}
input{width:100%;padding:8px;font-size:14px;font-weight:bold;border:1px solid #000;box-sizing:border-box}
.dugmeler{margin-top:10px;display:flex;gap:4px}
.dugmeler button{flex:1;padding:8px;border:none;color:#fff;font-weight:bold;cursor:pointer;font-size:12px}
.yesil{background:#0a8a0a}.turuncu{background:#e67300}
.istatistik{background:#f0f0f0;padding:6px;text-align:center;font-size:13px;font-weight:bold;border-bottom:1px solid #ccc}
.istatistik span{color:#a00000;font-size:15px}
.yuruyenKutu{background:#fff;margin-top:8px;border:1px solid #999;height:32px;overflow:hidden;position:relative}
.yuruyenYazi{position:absolute;white-space:nowrap;padding:7px 0;font-size:15px;font-weight:bold;color:#CC0000;text-transform:uppercase;animation: yatayKaydir 9s linear infinite}
@keyframes yatayKaydir {from { left: 100%; } to { left: -100%; }}
.sonucKutu{background:#fff;margin-top:6px;border:1px solid #999;min-height:50px;padding:10px;font-size:16px;font-weight:bold;color:#000;text-transform:uppercase;line-height:1.6}
.sonucKutu b{color:#a00000}
.sonucKutu hr{border:none;border-top:1px dashed #ccc;margin:6px 0}
.oneriKutu{display:none;margin-top:10px}
textarea{width:100%;padding:6px;box-sizing:border-box;border:1px solid #000}
.altBant{background:#ffd700;text-align:center;padding:8px;font-size:10px}
</style>
</head>
<body>

<div class="ana">
<div class="ustbant">★ CEMİL PAKYÜREK / 1973 İTÜ ★</div>
<div class="altbaslik">SAĞLIK İLE İLGİLİ SÖZCÜKLÜK</div>
<div class="b2">Bu bir sozluk degil. SOZCUKLUKTUR.</div>
<div class="b3">HER YABANCI SOZCUGE KARSILIK, YALIN TURKCE KARSILIK VARDIR</div>
<div class="istatistik">TOPLAM SÖZCÜK: <span id="toplam">0</span></div>

<div class="beyaz">
<input type="text" id="ara" autofocus placeholder="ornek: akşam">
<div class="dugmeler">
<button class="yesil" onclick="bul()">BUL</button>
<button class="turuncu" onclick="baska()">BAŞKA</button>
<button class="yesil" onclick="oner()">ONERI</button>
</div>
<div class="yuruyenKutu"><div id="yuruyen" class="yuruyenYazi"></div></div>
<div id="sonuc" class="sonucKutu"></div>
<div id="oneriKutu" class="oneriKutu">
<textarea id="oneriMetin" rows="2"></textarea>
<button class="yesil" onclick="onerGonder()">MAIL GONDER</button>
</div>
</div>
<div class="altBant">cemilp@gmail.com</div>
</div>

<script>
// SİZİN 2000 KELİMENİZİ BURAYA YAPIŞTIRIN
let sozluk = [
{ A: "quadrant", B: "dördün" },
{ A: "silikon", B: "silis" },
{ A: "akşam", B: "tün" },
{ A: "tün", B: "akşam" }
//... 2000 KELİMENİZ... EN SONDA VİRGÜL YOK
];

let mesajlar = [
"1. HER YABANCI KOKENLI SOZCÜGE KARSILIK, EN AZ BIR TANE YALIN TURKCE SOZCÜK VARDIR.",
"2. YALIN TURKCE ILE KONUS, ANLAS. BOYLECE HIZLI DÜSUN.",
"3. YALIN TÜRKCENIN KORUNMASI, HER YURTSEVERIN SORUMLULUGUNDADIR.",
"4. DILINI KORUYAMAYAN ULUSLAR, BAGIMSIZLIGINI KORUYAMAZ.",
"5. DILINI KORUYABILEN ULUSLAR, OZDEGERLERINI, EKININI KORUR VE GELISTIR.",
"6. DILINI KORU, BAGIMSIZLIGINI GÜVENCEYE AL.",
"7. BAGIMSIZLIK YALIN DIL ILE VARLIGINI KORUR VE GELISTIR."
];

let mapA = {}, mapB = {};

for(let i=0;i<sozluk.length;i++){
let x = sozluk[i].A.toLowerCase();
let y = sozluk[i].B.toLowerCase();
if(!mapA[x]) mapA[x]=[]; mapA[x].push(sozluk[i]);
if(!mapB[y]) mapB[y]=[]; mapB[y].push(sozluk[i]);
}

document.getElementById("toplam").innerText = sozluk.length;
document.getElementById("yuruyen").innerText = mesajlar[new Date().getDay()];

function bul(){
let g = document.getElementById("ara").value.toLowerCase();
if(g=="") return;
let sonuc = (mapA[g]||[]).concat(mapB[g]||[]);
if(sonuc.length>0){
let h="";
for(let i=0;i<sonuc.length;i++){
h+=`<b>YABAN:</b> ${sonuc[i].A.toUpperCase()}<br><b>YALIN:</b> ${sonuc[i].B.toUpperCase()}<hr>`;
}
document.getElementById("sonuc").innerHTML=h;
}else{
document.getElementById("sonuc").innerHTML="BULUNAMADI. ASAGIDAN ONERI GONDERIN.";
}
}

function baska(){
document.getElementById("ara").value="";
document.getElementById("sonuc").innerHTML="";
document.getElementById("oneriKutu").style.display="none";
document.getElementById("ara").focus();
}
function oner(){ document.getElementById("oneriKutu").style.display="block"; }
function onerGonder(){
let y = document.getElementById("ara").value;
let yl = document.getElementById("oneriMetin").value;
if(yl.trim()=="") { alert("LUTFEN ONERI YAZIN"); return; }
location.href=`mailto:cemilp@gmail.com?subject=Yalin Sozcuk&body=${y} - ${yl}`;
}
document.getElementById("ara").addEventListener("keypress", function(e){ if(e.key === "Enter") bul(); });
</script>
</body>
</html>
