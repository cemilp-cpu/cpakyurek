<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YABANCIYA YALIN SÖZCÜKLER</title>
<style>
body { background: #FF4500; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; }
.kutu { background: white; width: 90%; max-width: 400px; border: 5px solid #FFD700; border-radius: 15px; padding: 10px; box-shadow: 0 0 20px #000; }
.baslik { background: red; color: white; padding: 8px; font-size: 18px; font-weight: bold; text-align: center; }
.mavi { background: blue; color: white; padding: 8px; font-size: 14px; text-align: center; }
.turuncu { background: #FF4500; color: white; padding: 6px; font-size: 16px; font-weight: bold; text-align: center; }
.arama { width: 95%; padding: 8px; margin: 8px 0; font-size: 16px; border: 2px solid orange; }
.btn { background: green; color: white; border: none; padding: 8px 10px; margin: 3px; font-size: 14px; border-radius: 5px; cursor: pointer; }
.btn-baska { background: orange; }
.sonuc { margin-top: 10px; font-size: 16px; text-align: left; min-height: 60px; }
.oneri-kutu { display:none; margin-top:10px; }
.oneri-kutu textarea { width: 95%; height: 60px; }
.geri { background: #FFD700; border: 2px solid orange; padding: 8px; margin-top: 10px; font-size: 13px; }
</style>
</head>
<body>
<div class="kutu">
<div class="baslik">YABANCIYA YALIN SÖZCÜKLER</div>
<div class="mavi">Bu bir sözlük değil, SÖZCÜKLÜKTÜR.<br>Önerilen yalın Türkçe kelimeyi seç.</div>
<div class="turuncu">ARAMA</div>
<input id="kelime" class="arama" placeholder="Kelime yaz..." onkeypress="if(event.key==='Enter'){bul()}">
<button class="btn" onclick="bul()">BUL</button>
<button class="btn" onclick="onerKutusu()">ÖNERİ GÖNDER</button>
<button class="btn btn-baska" onclick="baskaCumle()">BAŞKA CÜMLE</button>
<div id="sonuc" class="sonuc"></div>
<div id="oneri" class="oneri-kutu">
<b>YALIN TÜRKÇE ÖNERİ:</b><br>
<textarea id="oneriText"></textarea><br>
<button class="btn" onclick="gonderOneri()">GÖNDER</button>
</div>
<div class="geri">
<b>GERİ BİLDİRİM:</b> Bu sözlük yabancı kelimeleri yalın Türkçe ile açıklar.
</div>
</div>
<script>
const sozluk = {
 "atrofi": , B: "YETERSİZLEŞME" , }, 
 "algoritma": , B: "işlem adıkları" , }, 
 "angle": , B: "açı" , }, 
 "asimtod": , B: "değemez" , }, 
 "atom": , B: "ögecik" , }, 
 "atom altı": , B: "ögecik altı" , }, 
 "cap": , B: "kap" , }, 
 "capacitor": , B: "kondansatör" , }, 
 "capsule": , B: "kapsül" , }, 
 "car": , B: "araba" , }, 
 "card": , B: "kart" , }, 
 "cardiology": , B: "kalp bilimi" , }, 
 "care": , B: "bakım" , }, 
 "cebir": , B: "sesadlı işlemler" , }, 
 "coherence": , B: "eşevre" , }, 
 "diferansiyel denklem": , B: "noktasallaştırılmiş denklem" , }, 
 "druzen": , B: "GÖZOLEN" , }, 
 "elektron": , B: "eksicik" , }, 
 "fizik": , B: "ögeciksel itişim" , }, 
 "fonksiyon": , B: "değer dönüştüren" , }, 
 "geometri": , B: "biçimler bilimi" , }, 
 "hacim": , B: "oylum" , }, 
 "harf": , B: "sesadı" , }, 
 "hassas": , B: "duyarlı" , }, 
 "integre": , B: "boyutsuzlaştırılmış toplam" , }, 
 "kimya": , B: "ögecikse birleşim" , }, 
 "koroid": , B: "ŞARLAK" , }, 
 "kosinüs": , B: "komşu boşluk" , }, 
 "lineer": , B: "doğrusal" , }, 
 "macula": , B: "öziç" , }, 
 "matematik": , B: "çokluklar bilimi" , }, 
 "mononom": , B: "tek terimli" , }, 
 "nolineer": , B: "doğrusal olmayan" , }, 
 "nötron": , B: " ağırcık" , }, 
 "oct": , B: "ışınla eş evreli kesit gösterim" , }, 
 "piramit": , B: "çatkı" , }, 
 "polinom": , B: "çokterimli" , }, 
 "prizma": , B: "oylumger" , }, 
 "proton": , B: "artıcık" , }, 
 "rakam": , B: "açısay" , }, 
 "rektangıl": , B: "dikdörtgen" , }, 
 "retina": , B: "AĞ KATMANI" , }, 
 "sinüs": , B: "boşluk" , }, 
 "square": , B: "kare" , }, 
 "tanjant": , B: "eğim" , }, 
 "tomografi": , B: "kesit gösterim" , }, 
 "triangle": , B: "üçgen" , }, 
 "trigonometri": , B: "açılar bilimi" , }, 
 "vitreus": , B: "CAMSI SIVI" , }, 
 "zaviye": , B: "açı" , } 

  };
function bul() {
let k = document.getElementById("kelime").value.toLowerCase().trim();
let s = document.getElementById("sonuc");
if(sozluk[k]){ s.innerHTML = "<b>" + k + "</b> = " + sozluk[k]; }
else { s.innerHTML = "Kelime bulunamadı. Öneri gönderebilirsin."; }
}
function onerKutusu(){ document.getElementById("oneri").style.display="block"; }
function gonderOneri(){ alert("Teşekkürler! Öneriniz alındı."); document.getElementById("oneri").style.display="none"; document.getElementById("oneriText").value=""; }
function baskaCumle(){ document.getElementById("kelime").value=""; document.getElementById("sonuc").innerHTML=""; }
</script>
</body>
</html>
