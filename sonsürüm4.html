    function ara() {
        const girdi = document.getElementById('arama').value.toLocaleLowerCase('tr-TR');
        const cikis = document.getElementById('sonuclar');
        cikis.innerHTML = "";
        let sayac = 1;

        if (girdi.length < 1) return;

        havuz.forEach(oge => {
            const kumeA = oge.a.toLocaleLowerCase('tr-TR');
            const kumeB = oge.b.toLocaleLowerCase('tr-TR');

            if (kumeA.includes(girdi) || kumeB.includes(girdi)) {
                const div = document.createElement('div');
                // B kümesinde bulunduysa mavi taban, aksi halde yeşil taban
                div.className = kumeB.includes(girdi) ? 'sonuc-kart kume-b' : 'sonuc-kart kume-a';
                
                div.innerHTML = `
                    <span class="numara">${sayac}</span>
                    <span class="etiket">${kumeB.includes(girdi) ? "Karşılıklı Bulma (B)" : "Yalınlaştırma (A)"}</span>
                    <strong>Eski Karşılık:</strong> ${oge.a}<br>
                    <strong>Yalın Türkçe:</strong> <span style="color:#27ae60; font-weight:bold;">${oge.b}</span>
                `;
                cikis.appendChild(div);
                sayac++;
            }
        });
    }
